<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スタンプラリー</title>
  <!-- QR コード読み込みライブラリ (html5-qrcode) -->
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; background: #f5f4f0; min-height: 100vh; color: #333; }
    
    /* レイアウト */
    .wrap { padding: 1.5rem 1rem; max-width: 480px; margin: 0 auto; }
    .title { text-align: center; font-size: 24px; font-weight: 500; margin-bottom: 0.4rem; color: #1a1a1a; }
    .subtitle { text-align: center; font-size: 13px; color: #888; margin-bottom: 1.5rem; }

    /* スタンプグリッド */
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-bottom: 1.5rem; }
    
    /* カードデザイン */
    .stamp-card { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 14px 6px; border-radius: 14px; border: 1px solid #e0deda; background: #fff; transition: transform 0.2s; }
    .stamp-card:active { transform: scale(0.95); }

    /* スタンプ円 */
    .stamp-circle { width: 72px; height: 72px; border-radius: 50%; border: 2.5px dashed #ccc; display: flex; align-items: center; justify-content: center; transition: all 0.35s; }
    
    /* スタンプ押された状態 */
    .stamp-circle.stamped { border: 2.5px solid #1D9E75; background: #E1F5EE; animation: pop 0.4s ease; }
    .stamp-icon { font-size: 36px; opacity: 0; transform: scale(0.4) rotate(-15deg); transition: all 0.35s; filter: grayscale(1); }
    .stamped .stamp-icon { opacity: 1; transform: scale(1) rotate(-8deg); filter: none; }

    /* テキスト */
    .stamp-name { font-size: 13px; color: #888; text-align: center; line-height: 1.4; transition: color 0.3s; }
    .stamped .stamp-name { color: #0F6E56; font-weight: 500; }

    /* プログレスバー */
    .progress-bar-wrap { height: 7px; background: #e8e6e0; border-radius: 99px; margin-bottom: 1.5rem; overflow: hidden; }
    .progress-bar { height: 100%; background: #1D9E75; border-radius: 99px; transition: width 0.5s ease; }

    /* コンプリートバナー */
    .complete-banner { display: none; background: #E1F5EE; border: 1px solid #5DCAA5; border-radius: 12px; padding: 1rem; text-align: center; margin-bottom: 1rem; }
    .complete-banner.show { display: block; animation: pop 0.4s ease; }
    .complete-banner p { color: #0F6E56; font-size: 15px; font-weight: 500; }
    .complete-banner small { color: #1D9E75; font-size: 13px; }

    /* ボタンエリア */
    .scan-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 15px; border-radius: 14px; border: 1px solid #d0ceca; background: #fff; font-size: 16px; font-weight: 500; cursor: pointer; color: #1a1a1a; transition: background 0.15s; margin-bottom: 1rem; }
    .scan-btn:hover { background: #f0ede8; }
    
    /* リセットボタン */
    .reset-btn { display: block; margin: 0 auto; font-size: 12px; color: #aaa; background: none; border: none; cursor: pointer; text-decoration: underline; padding: 6px 10px; }

    /* カメラオーバーレイ */
    .cam-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 3rem; z-index: 99; }
    .cam-overlay.show { display: flex; }

    /* カメラ画面 */
    .camera-wrap { position: relative; width: 100%; max-width: 400px; height: 60vh; overflow: hidden; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    #preview { width: 100%; height: 100%; object-fit: cover; display: block; }
    
    /* QR フレーム */
    .scan-frame { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 60%; aspect-ratio: 1; border: 2px solid rgba(29, 158, 117, 0.6); border-radius: 10px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.45); pointer-events: none; }
    .corner { position: absolute; width: 20px; height: 20px; border-color: #1D9E75; border-style: solid; }
    .corner.tl { top: -2px; left: -2px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    .corner.tr { top: -2px; right: -2px; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
    .corner.bl { bottom: -2px; left: -2px; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
    .corner.br { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

    /* ステータス表示 */
    .scan-status { color: #fff; font-size: 14px; text-align: center; margin: 1.2rem 0 0.5rem; padding: 0 1.5rem; min-height: 22px; }
    .scan-status.found { color: #5DCAA5; font-weight: 500; }
    .scan-status.error { color: #F09595; }

    /* モーダル共通 */
    .backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 198; backdrop-filter: blur(2px); }
    .backdrop.show { display: block; animation: fadeIn 0.3s ease; }
    
    .modal { background: #fff; border-radius: 16px; padding: 1.5rem; max-width: 300px; width: 90%; text-align: center; border: 1px solid #e0deda; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0.8); z-index: 199; opacity: 0; transition: all 0.3s ease; }
    .modal.show { display: block; animation: pop-center 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform: translate(-50%,-50%) scale(1); }
    
    .modal p { font-size: 16px; color: #1a1a1a; margin-bottom: 0.4rem; font-weight: 500; }
    .modal small { font-size: 13px; color: #888; display: block; margin-bottom: 1.2rem; line-height: 1.4; }

    /* モーダルボタン */
    .modal-actions { display: flex; gap: 10px; }
    .modal-actions button { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #d0ceca; background: #f5f4f0; font-size: 14px; cursor: pointer; color: #1a1a1a; transition: all 0.15s; }
    .modal-actions button:hover { background: #e8e6e0; }
    
    /* モーダルアクションボタン */
    .confirm-green { background: #1D9E75; border-color: #1D9E75; color: #fff; font-weight: 500; box-shadow: 0 2px 4px rgba(29, 158, 117, 0.3); }
    .confirm-green:hover { background: #0F6E56; }
    
    .confirm-red { background: #E24B4A; border-color: #E24B4A; color: #fff; font-weight: 500; box-shadow: 0 2px 4px rgba(226, 75, 74, 0.3); }
    .confirm-red:hover { background: #A32D2D; }

    /* アニメーション */
    @keyframes pop { 0%{transform:scale(0.85)} 60%{transform:scale(1.1)} 100%{transform:scale(1)} }
    @keyframes pop-center { 0%{transform:translate(-50%,-50%) scale(0.85)} 60%{transform:translate(-50%,-50%) scale(1.08)} 100%{transform:translate(-50%,-50%) scale(1)} }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">🏮 スタンプラリー</div>
    <div class="subtitle">QR コードを読み取ってスタンプを集めよう！</div>
    
    <!-- コンプリートバナー -->
    <div class="complete-banner" id="banner">
      <p>🎉 全スタンプ制覇！</p>
      <small>おめでとうございます！全ブースを回りました。</small>
    </div>

    <!-- プログレスバー -->
    <div class="progress-bar-wrap"><div class="progress-bar" id="progress" style="width:0%"></div></div>
    
    <!-- スタンプグリッド -->
    <div class="grid" id="grid"></div>

    <!-- 読み取りボタン -->
    <button class="scan-btn" id="open-camera">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="5" height="5" rx="1"/><rect x="16" y="3" width="5" height="5" rx="1"/>
        <rect x="3" y="16" width="5" height="5" rx="1"/>
        <path d="M16 16h2v2h-2zM18 18h2v2h-2zM16 20h2"/><path d="M20 16v2"/>
        <path d="M9 4h6M4 9v6M20 9v3M9 20h3"/>
      </svg>
      QR コードを読み取る
    </button>

    <!-- リセットボタン -->
    <button class="reset-btn" id="reset-btn">リセット</button>
  </div>

  <!-- カメラオーバーレイ -->
  <div class="cam-overlay" id="cam-overlay">
    <div class="camera-wrap">
      <video id="preview" playsinline autoplay muted></video>
      <!-- html5-qrcode は canvas を内部で管理するため、ここでは非表示にします -->
    </div>
    <div class="scan-status" id="scan-status">QR コードを枠内に合わせてください</div>
    <button class="close-cam" style="margin-top: 1rem; padding: 10px 32px; border-radius: 10px; border: none; background: rgba(255,255,255,0.2); color: #fff; font-size: 14px; cursor: pointer;" id="close-cam">閉じる</button>
  </div>

  <!-- スタンプ確認モーダル -->
  <div class="backdrop" id="stamp-backdrop"></div>
  <div class="modal" id="stamp-modal">
    <p id="stamp-modal-title"></p>
    <small>QR コードを読み取りました。<br>スタンプを押しますか？</small>
    <div class="modal-actions">
      <button id="stamp-cancel-btn">キャンセル</button>
      <button class="confirm-green" id="stamp-confirm-btn">スタンプを押す！</button>
    </div>
  </div>

  <!-- リセット確認モーダル -->
  <div class="backdrop" id="reset-backdrop"></div>
  <div class="modal" id="reset-modal">
    <p>リセットしますか？</p>
    <small>集めたスタンプがすべて消えます。<br>この操作は元に戻せません。</small>
    <div class="modal-actions">
      <button id="reset-cancel-btn">キャンセル</button>
      <button class="confirm-red" id="reset-confirm-btn">リセット</button>
    </div>
  </div>

<script>
    // --- データ設定 ---
    const booths = [
        { id: 'pong', name: "ピンポン玉ゲーム", qr: "booth:pong", icon: "🎱" },
        { id: 'ring', name: "輪投げ",         qr: "booth:ring",  icon: "🪀" },
        { id: 'shooting', name: "射的",       qr: "booth:shooting", icon: "🎯" },
        { id: 'marbles', name: "お手玉投げゲーム", qr: "booth:marbles", icon: "🔴" },
        { id: 'superbowl', name: "スーパーボウルすくい", qr: "booth:superbowl", icon: "🏈" },
        { id: 'reversi', name: "オセロゲーム",   qr: "booth:reversi",  icon: "⚫⚪" },
        { id: 'slipper', name: "スリッパ飛ばし", qr: "booth:slipper",  icon: "🩴" }
    ];

    const KEY = "stamp_rally_v2"; // ローカルストレージのキー名
    
    // --- 初期化処理 ---
    function load() { try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch(e) { return []; } }
    function save(arr) { try { localStorage.setItem(KEY, JSON.stringify(arr)); } catch(e) {} }

    let stamped = load();
    
    // DOM 要素の取得
    const grid = document.getElementById("grid");
    const progressEl = document.getElementById("progress");
    const bannerEl = document.getElementById("banner");
    const scanStatusEl = document.getElementById("scan-status");
    const previewVideo = document.getElementById("preview");

    // --- 描画処理 ---
    function render() {
      grid.innerHTML = "";
      booths.forEach(b => {
        const isStamped = stamped.includes(b.id);
        const card = document.createElement("div");
        card.className = "stamp-card";
        card.innerHTML = `
          <div class="stamp-circle${isStamped ? " stamped" : ""}">
            <span class="stamp-icon">${b.icon}</span>
          </div>
          <span class="stamp-name${isStamped ? " done" : ""}">${b.name}</span>
        `;
        grid.appendChild(card);
      });

      // プログレス更新
      const count = stamped.length;
      progressEl.style.width = `${(count / booths.length) * 100}%`;
      
      // コンプリート判定
      if (count === booths.length) {
          bannerEl.classList.add("show");
      } else {
          bannerEl.classList.remove("show");
      }
    }

    // --- カメラ起動処理 ---
    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" }, // 後方カメラ優先
                audio: false 
            });
            
            previewVideo.srcObject = stream;
            previewVideo.onloadedmetadata = () => {
                previewVideo.play();
                scanStatusEl.textContent = "QR コードを枠内に合わせてください";
                scanStatusEl.className = "scan-status";
                
                // html5-qrcode の初期化と起動
                const html5QrCode = new Html5Qrcode("preview");
                
                const config = { fps: 10, qrbox: { width: 250, height: 250 } };

                html5QrCode.start(
                    { facingMode: "environment" }, 
                    config,
                    onScanSuccess
                ).catch(err => {
                    console.error("Camera start error:", err);
                    scanStatusEl.textContent = "カメラの起動に失敗しました。ブラウザの設定でカメラを許可してください。";
                    scanStatusEl.className = "scan-status error";
                });

            };
        } catch(e) {
            scanStatusEl.textContent = "カメラの起動に失敗しました。\nブラウザの設定でカメラを許可してください。";
            scanStatusEl.className = "scan-status error";
            console.error("Camera permission denied:", e);
        }
    }

    // --- QR コード読み取り成功時の処理 ---
    function onScanSuccess(decodedText, decodedResult) {
        let booth = booths.find(b => b.qr === decodedText);
        
        if (!booth) {
            try {
                const url = new URL(decodedText);
                const boothParam = url.searchParams.get("booth");
                if (boothParam !== null) booth = booths.find(b => b.id === boothParam);
            } catch(e) {}
        }

        // 不正な QR コードの場合の処理
        if (!booth) {
            scanStatusEl.textContent = "対応していない QR コードです";
            scanStatusEl.className = "scan-status error";
            setTimeout(() => {
                scanStatusEl.textContent = "QR コードを枠内に合わせてください";
                scanStatusEl.className = "scan-status";
            }, 2000);
            return;
        }

        // 既に押している場合の処理
        if (stamped.includes(booth.id)) {
            const el = document.getElementById("already-msg");
            if(el) {
                el.textContent = `${booth.icon} 「${booth.name}」はすでにスタンプ済みです`;
                el.classList.add("show");
                setTimeout(() => el.classList.remove("show"), 3000);
            } else {
                // モーダルで「もう押しています」と表示する（既存の UI に合わせるため）
                const modalTitle = document.getElementById("stamp-modal-title");
                if(modalTitle) modalTitle.textContent = `${booth.icon} 「${booth.name}」`;
                
                const backdrop = document.getElementById("stamp-backdrop");
                const modal = document.getElementById("stamp-modal");
                backdrop.classList.add("show");
                modal.classList.add("show");
            }
            return;
        }

        // 新規読み取り成功時の処理（モーダル表示）
        const modalTitle = document.getElementById("stamp-modal-title");
        if(modalTitle) modalTitle.textContent = `${booth.icon} 「${booth.name}」`;
        
        const backdrop = document.getElementById("stamp-backdrop");
        const modal = document.getElementById("stamp-modal");
        backdrop.classList.add("show");
        modal.classList.add("show");
    }

    // --- カメラ停止処理 ---
    function stopCamera() {
        if (html5QrcodeScanner) {
            html5QrcodeScanner.stop().then(() => {
                html5QrcodeScanner.clear();
            }).catch(err => console.error("Stop error", err));
        }
        
        // 動画ストリームを停止
        if (previewVideo.srcObject) {
            previewVideo.srcObject.getTracks().forEach(track => track.stop());
        }

        document.getElementById("cam-overlay").classList.remove("show");
    }

    // --- イベントリスナー設定 ---
    
    // ボタンクリックイベント
    document.getElementById("open-camera").onclick = startCamera;
    document.getElementById("close-cam").onclick = stopCamera;

    // モーダル操作（キャンセル）
    document.getElementById("stamp-cancel-btn").onclick = () => {
        document.getElementById("stamp-backdrop").classList.remove("show");
        document.getElementById("stamp-modal").classList.remove("show");
    };

    // モーダル操作（確定・スタンプ押す）
    document.getElementById("stamp-confirm-btn").onclick = () => {
        const boothId = booths.find(b => b.qr === document.getElementById("stamp-modal-title").textContent.replace(/[^a-zA-Z0-9]/g, '')).id; // 簡易的な ID 取得（実際にはモーダルに ID を渡すのが確実だが、今回は簡略化）
        
        // より正確な処理のため、タイトルから名前で検索するロジックを補完します。
        const boothName = document.getElementById("stamp-modal-title").textContent.split('「')[1].split('」')[0];
        const booth = booths.find(b => b.name === boothName);

        if (booth && !stamped.includes(booth.id)) {
            stamped.push(booth.id);
            save(stamped);
            render();
        }
        
        document.getElementById("stamp-backdrop").classList.remove("show");
        document.getElementById("stamp-modal").classList.remove("show");
    };

    // リセットボタンクリック（モーダル表示）
    document.getElementById("reset-btn").onclick = () => {
        document.getElementById("reset-backdrop").classList.add("show");
        document.getElementById("reset-modal").classList.add("show");
    };

    // リセットキャンセル
    document.getElementById("reset-cancel-btn").onclick = () => {
        document.getElementById("reset-backdrop").classList.remove("show");
        document.getElementById("reset-modal").classList.remove("show");
    };

    // リセット確定
    document.getElementById("reset-confirm-btn").onclick = () => {
        stamped = [];
        localStorage.removeItem(KEY);
        document.getElementById("reset-backdrop").classList.remove("show");
        document.getElementById("reset-modal").classList.remove("show");
        render();
    };

    // ページ読み込み時に描画開始
    render();

</script>
</body>
</html>
