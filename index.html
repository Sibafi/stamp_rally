<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スタンプラリー</title>
    <!-- QR コード読み込みライブラリ -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        :root {
            --primary-color: #ff6b6b;
            --secondary-color: #4ecdc4;
            --bg-color: #f7f9fc;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            text-align: center;
            color: #333;
        }

        h1 { margin-bottom: 10px; font-size: 1.5rem; }
        
        /* スタンプ表示エリア */
        .stamp-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 600px;
            margin: 0 auto 30px auto;
        }

        .stamp-item {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            position: relative;
        }

        .stamp-item.completed {
            background-color: #e8f5e9; /* 緑色 */
            border: 2px solid var(--secondary-color);
        }

        .stamp-icon { font-size: 40px; display: block; margin-bottom: 10px; }
        .stamp-name { font-weight: bold; font-size: 0.9rem; }
        
        /* スタンプが押された時の演出用アニメーション */
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .stamp-item.completed .stamp-icon { animation: pop 0.3s ease; }

        /* ボタンエリア */
        .action-area {
            max-width: 600px;
            margin: 0 auto;
        }

        #scan-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 107, 107, 0.4);
            transition: transform 0.2s;
        }

        #scan-btn:active { transform: scale(0.95); }
        
        /* カメラ画面 */
        #reader { width: 100%; display: none; margin-top: 20px;}
        
        /* コンプリート演出用オーバーレイ */
        #completion-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
        }
        #completion-overlay h2 { font-size: 3rem; margin-bottom: 20px; animation: pop 0.5s infinite alternate;}

    </style>
</head>
<body>

    <h1>🎉 スタンプラリー 🎉</h1>
    
    <!-- スタンプ表示エリア -->
    <div class="stamp-grid" id="stamp-container">
        <!-- JavaScript で生成されます -->
    </div>

    <!-- 操作ボタン -->
    <div class="action-area">
        <button id="scan-btn">📷 QR コードを読み取る</button>
        
        <!-- カメラ読み込みエリア -->
        <div id="reader"></div>
    </div>

    <!-- コンプリート演出 -->
    <div id="completion-overlay">
        <h2>CONGRATULATIONS!</h2>
        <p style="font-size: 1.5rem;">全スタンプを収集しました！</p>
        <button onclick="closeOverlay()" style="margin-top:20px; padding:10px 20px; cursor:pointer;">閉じる</button>
    </div>

<script>
    // --- 設定データ ---
    const booths = [
        { id: 'pong', name: 'ピンポン玉ゲーム', icon: '🎱' },
        { id: 'ring', name: '輪投げ', icon: '🪀' },
        { id: 'shooting', name: '射的', icon: '🎯' },
        { id: 'marbles', name: 'お手玉投げゲーム', icon: '🔴' },
        { id: 'superbowl', name: 'スーパーボウルすくい', icon: '🏈' },
        { id: 'reversi', name: 'オセロゲーム', icon: '⚫⚪' },
        { id: 'slipper', name: 'スリッパ飛ばし', icon: '🩴' }
    ];

    // --- 初期化処理 ---
    const container = document.getElementById('stamp-container');
    const scanBtn = document.getElementById('scan-btn');
    const readerDiv = document.getElementById('reader');
    let html5QrcodeScanner;

    // ローカルストレージから現在の進捗を取得（なければ空配列）
    function getProgress() {
        return JSON.parse(localStorage.getItem('stampRallyProgress')) || [];
    }

    // スタンプを画面に描画する関数
    function renderStamps() {
        container.innerHTML = '';
        booths.forEach(booth => {
            const isCompleted = getProgress().includes(booth.id);
            
            const div = document.createElement('div');
            div.className = `stamp-item ${isCompleted ? 'completed' : ''}`;
            div.innerHTML = `
                <span class="stamp-icon">${booth.icon}</span>
                <div class="stamp-name">${booth.name}</div>
            `;
            container.appendChild(div);
        });

        // コンプリート判定
        if (getProgress().length === 7) {
            setTimeout(() => {
                document.getElementById('completion-overlay').style.display = 'flex';
            }, 500);
        }
    }

    // --- QR コード読み込みロジック ---
    
    scanBtn.addEventListener('click', () => {
        readerDiv.style.display = 'block';
        
        html5QrcodeScanner = new Html5Qrcode("reader");
        
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };

        // カメラ起動（後方カメラ優先）
        html5QrcodeScanner.start(
            { facingMode: "environment" }, 
            config,
            onScanSuccess
        ).catch(err => {
            console.error("Camera start error:", err);
            alert("カメラの起動に失敗しました。\nブラウザの許可を確認してください。");
        });
    });

    function onScanSuccess(decodedText, decodedResult) {
        // 読み取り成功時の処理
        
        // 1. カメラを停止して画面に戻す
        html5QrcodeScanner.stop().then(() => {
            readerDiv.style.display = 'none';
            
            // 2. QR コードの中身を確認（今回は ID を取得する想定）
            // ※デモ用に、読み取った文字列そのものを処理します。
            // 実運用では、各ブースの QR コードに「pong」「ring」などの ID が書かれている必要があります。
            
            const boothId = decodedText; 
            
            if (booths.find(b => b.id === boothId)) {
                markStampAsCompleted(boothId);
            } else {
                alert("そのブースの QR コードではありません。\n正しい QR コードを読み込んでください。");
            }

        }).catch(err => {
            console.error("Camera stop error:", err);
        });
    }

    // スタンプを押す処理
    function markStampAsCompleted(boothId) {
        const progress = getProgress();
        
        if (!progress.includes(boothId)) {
            progress.push(boothId);
            localStorage.setItem('stampRallyProgress', JSON.stringify(progress));
            
            // 画面更新
            renderStamps();
            
            // ボタンを元に戻す（少し待ってから）
            setTimeout(() => {
                scanBtn.style.display = 'block';
            }, 1000);
        } else {
            alert("もう押していますよ！");
        }
    }

    function closeOverlay() {
        document.getElementById('completion-overlay').style.display = 'none';
    }

    // ページ読み込み時に描画開始
    renderStamps();

</script>
</body>
</html>
