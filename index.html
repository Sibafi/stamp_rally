<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スタンプラリー</title>
    <!-- QR コード読み込みライブラリ -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        :root {
            --primary-color: #ff6b6b;
            --secondary-color: #4ecdc4;
            --bg-color: #f7f9fc;
            --card-bg: #ffffff;
            --stamp-ink-color: rgba(255, 107, 107, 0.8); /* スタンプのインク色 */
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            text-align: center;
            color: #333;
            overflow-x: hidden; /* スクロール防止 */
        }

        h1 { 
            margin-bottom: 10px; 
            font-size: 1.5rem; 
            word-break: break-all;
        }
        
        /* --- スタンプ表示エリア (ハンコ風) --- */
        .stamp-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 600px;
            margin: 0 auto 30px auto;
        }

        @media (max-width: 480px) {
            .stamp-grid { grid-template-columns: 1fr; }
        }

        .stamp-item {
            background: var(--card-bg);
            border-radius: 50%; /* ハンコのような丸い形 */
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1), inset 0 -3px 0 var(--stamp-ink-color); /* インクがついたような影 */
            transition: all 0.3s ease;
            position: relative;
            cursor: pointer;
            border: 4px solid #eee;
        }

        .stamp-item.completed {
            background-color: var(--card-bg); 
            /* 押された状態のスタイル */
            box-shadow: inset 0 -5px 0 var(--primary-color), 0 10px 20px rgba(0,0,0,0.2);
            border-color: var(--secondary-color);
        }

        .stamp-icon { font-size: 40px; display: block; margin-bottom: 5px; pointer-events: none;}
        .stamp-name { font-weight: bold; font-size: 0.9rem; word-break: break-all; pointer-events: none;}
        
        /* ハンコ押した時のアニメーション */
        @keyframes stamp-ink {
            0% { transform: scale(1); filter: blur(0px); }
            50% { transform: scale(1.3) rotate(-2deg); filter: blur(2px); } /* インクが滲む */
            100% { transform: scale(1.1) rotate(0deg); filter: blur(0px); }
        }

        .stamp-item.completed .stamp-icon { 
            animation: stamp-ink 0.4s ease-out; /* アニメーション適用 */
        }

        /* --- ボタンエリア --- */
        .action-area {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #scan-btn, #reset-btn {
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        #scan-btn { background-color: var(--primary-color); color: white; }
        #reset-btn { background-color: #95a5a6; color: white; font-size: 1rem;}
        
        #scan-btn:active, #reset-btn:active { transform: scale(0.95); }

        /* --- QR コード読み取り画面 (モーダル風) --- */
        #reader-container { 
            width: 100%; 
            display: none; 
            margin-top: 20px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 50;
        }

        /* モーダルの背景（暗くする） */
        #scan-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85); /* 暗い背景 */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 49;
        }

        #reader { 
            width: 100%; 
            height: 100%;
            position: relative;
            z-index: 50; /* カメラ画面 */
        }

        /* --- コンプリート演出 (紙吹雪) --- */
        #completion-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.9); /* 白く明るく */
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
            box-sizing: border-box;
        }

        #completion-overlay h2 { 
            font-size: clamp(2rem, 8vw, 3.5rem); 
            margin-bottom: 10px; 
            color: var(--primary-color);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        #completion-overlay p { font-size: clamp(1rem, 4vw, 1.5rem); margin-bottom: 20px; color: #333;}
        
        .overlay-btn {
            padding: 15px 30px;
            background-color: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
        }

        /* コンフェッティ用 Canvas */
        #confetti-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 99;
        }

    </style>
</head>
<body>

    <!-- タイトル -->
    <h1>🎉 スタンプラリー 🎉</h1>
    
    <!-- QR コード読み取り画面（初期は非表示） -->
    <div id="reader-container">
        <div id="scan-overlay"></div>
        <div id="reader"></div>
    </div>

    <!-- 各ブースのスタンプラリー -->
    <div class="stamp-grid" id="stamp-container">
        <!-- JavaScript で生成されます -->
    </div>

    <!-- 操作ボタンエリア -->
    <div class="action-area">
        <button id="scan-btn">📷 QR コードを読み取る</button>
        
        <!-- リセットボタン -->
        <button id="reset-btn" onclick="resetProgress()">🔄 スタンプをリセットする</button>
    </div>

    <!-- コンプリート演出 -->
    <div id="completion-overlay">
        <h2>CONGRATULATIONS!</h2>
        <p style="font-size: 1.5rem;">全スタンプを収集しました！</p>
        <button class="overlay-btn" onclick="closeOverlay()">閉じる</button>
    </div>

<script>
    // --- 設定データ ---
    const booths = [
        { id: 'pong', name: 'ピンポン玉ゲーム', icon: '🎱' },
        { id: 'ring', name: '輪投げ', icon: '🪀' },
        { id: 'shooting', name: '射的', icon: '🎯' },
        { id: 'marbles', name: 'お手玉投げゲーム', icon: '🔴' },
        { id: 'superbowl', name: 'スーパーボウルすくい', icon: '🏈' },
        { id: 'reversi', name: 'オセロゲーム', icon: '⚫⚪' },
        { id: 'slipper', name: 'スリッパ飛ばし', icon: '🩴' }
    ];

    // --- 初期化処理 ---
    const container = document.getElementById('stamp-container');
    const scanBtn = document.getElementById('scan-btn');
    const readerDiv = document.getElementById('reader');
    const overlayDiv = document.getElementById('scan-overlay');
    let html5QrcodeScanner;

    // ローカルストレージから現在の進捗を取得（なければ空配列）
    function getProgress() {
        return JSON.parse(localStorage.getItem('stampRallyProgress')) || [];
    }

    // スタンプを画面に描画する関数
    function renderStamps() {
        container.innerHTML = '';
        booths.forEach(booth => {
            const isCompleted = getProgress().includes(booth.id);
            
            const div = document.createElement('div');
            div.className = `stamp-item ${isCompleted ? 'completed' : ''}`;
            // 押した時のアニメーションクラスを付与
            if (isCompleted) {
                div.classList.add('animate-ink'); 
            }
            div.innerHTML = `
                <span class="stamp-icon">${booth.icon}</span>
                <div class="stamp-name">${booth.name}</div>
            `;
            container.appendChild(div);
        });

        // コンプリート判定
        if (getProgress().length === 7) {
            setTimeout(() => {
                document.getElementById('completion-overlay').style.display = 'flex';
                startConfetti(); // 紙吹雪演出開始
            }, 500);
        }
    }

    // --- QR コード読み込みロジック ---
    
    scanBtn.addEventListener('click', () => {
        readerDiv.style.display = 'block';
        
        html5QrcodeScanner = new Html5Qrcode("reader");
        
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };

        // カメラ起動（後方カメラ優先）
        html5QrcodeScanner.start(
            { facingMode: "environment" }, 
            config,
            onScanSuccess
        ).catch(err => {
            console.error("Camera start error:", err);
            alert("カメラの起動に失敗しました。\nブラウザの許可を確認してください。");
        });

        // 読み取り開始時に背景を暗くする（モーダル風）
        overlayDiv.style.display = 'flex';
    });

    function onScanSuccess(decodedText, decodedResult) {
        // 読み取り成功時の処理
        
        // 1. カメラを停止して画面に戻す
        html5QrcodeScanner.stop().then(() => {
            readerDiv.style.display = 'none';
            
            // 2. QR コードの中身を確認（今回は ID を取得する想定）
            const boothId = decodedText; 
            
            if (booths.find(b => b.id === boothId)) {
                markStampAsCompleted(boothId);
            } else {
                alert("そのブースの QR コードではありません。\n正しい QR コードを読み込んでください。");
            }

        }).catch(err => {
            console.error("Camera stop error:", err);
        });
    }

    // スタンプを押す処理
    function markStampAsCompleted(boothId) {
        const progress = getProgress();
        
        if (!progress.includes(boothId)) {
            progress.push(boothId);
            localStorage.setItem('stampRallyProgress', JSON.stringify(progress));
            
            // 画面更新
            renderStamps();
            
            // ボタンを元に戻す（少し待ってから）
            setTimeout(() => {
                scanBtn.style.display = 'block';
            }, 1000);
        } else {
            alert("もう押していますよ！");
        }
    }

    // --- リセット処理 ---
    
    function resetProgress() {
        if(confirm('スタンプをすべてリセットします。よろしいですか？')) {
            localStorage.removeItem('stampRallyProgress');
            renderStamps();
            alert("リセット完了しました！");
        }
    }

    function closeOverlay() {
        document.getElementById('completion-overlay').style.display = 'none';
        stopConfetti(); // 演出停止
    }

    // --- コンフェッティ（紙吹雪）演出ロジック ---
    
    let confettiInterval;
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    function startConfetti() {
        const overlay = document.getElementById('completion-overlay');
        // Canvas をオーバーレイの直下に配置
        overlay.appendChild(canvas);
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        const colors = ['#ff6b6b', '#4ecdc4', '#ffeaa7', '#5f27cd']; // 派手な色

        function createParticle() {
            return {
                x: Math.random() * canvas.width,
                y: -10,
                size: Math.random() * 10 + 5,
                speedY: Math.random() * 3 + 2,
                speedX: (Math.random() - 0.5) * 4,
                color: colors[Math.floor(Math.random() * colors.length)],
                rotation: Math.random() * 360,
                rotationSpeed: (Math.random() - 0.5) * 10
            };
        }

        // 初期の粒子数
        for(let i=0; i<200; i++) {
            particles.push(createParticle());
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach((p, index) => {
                p.y += p.speedY;
                p.x += Math.sin(p.y * 0.01) * 2; // 波打つ動き
                p.rotation += p.rotationSpeed;

                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate((p.rotation * Math.PI) / 180);
                ctx.fillStyle = p.color;
                
                // 紙吹雪の形（四角形）
                ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                ctx.restore();

                // 画面外に出たらリセット
                if (p.y > canvas.height) {
                    particles[index] = createParticle();
                }
            });

            confettiInterval = requestAnimationFrame(draw);
        }

        draw();
    }

    function stopConfetti() {
        cancelAnimationFrame(confettiInterval);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // Canvas を DOM から削除（メモリ解放のため）
        if(canvas.parentNode) {
            canvas.parentNode.removeChild(canvas);
        }
    }

    // ページ読み込み時に描画開始
    renderStamps();

</script>
</body>
</html>
