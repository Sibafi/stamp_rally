<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スタンプラリー</title>
    <!-- QR コード読み込みライブラリ -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        :root {
            --primary-color: #ff6b6b;
            --secondary-color: #4ecdc4;
            --bg-color: #f7f9fc;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            text-align: center;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1 { 
            margin-bottom: 10px; 
            font-size: 1.5rem; 
            word-break: break-all;
        }
        
        /* スタンプ表示エリア */
        .stamp-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 600px;
            margin: 0 auto 30px auto;
            flex-grow: 1; /* 画面の空きスペースを埋める */
        }

        @media (max-width: 480px) {
            .stamp-grid { grid-template-columns: 1fr; }
        }

        .stamp-item {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stamp-item.completed {
            background-color: #e8f5e9; 
            border: 2px solid var(--secondary-color);
        }

        /* スタンプ押された時のアニメーション */
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); filter: brightness(1.2); }
            100% { transform: scale(1); }
        }

        .stamp-icon { font-size: 48px; display: block; margin-bottom: 10px; transition: all 0.3s ease;}
        
        /* スタンプが完了した時のアニメーションクラス */
        .stamp-item.completed .stamp-icon { animation: pop 0.5s ease; }

        .stamp-name { font-weight: bold; font-size: 0.9rem; word-break: break-all;}
        
        /* ボタンエリア */
        .action-area {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 20px;
        }

        #scan-btn, #reset-btn {
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.2s, opacity 0.3s;
        }

        #scan-btn { background-color: var(--primary-color); color: white; }
        #reset-btn { background-color: #95a5a6; color: white; font-size: 1rem;}
        
        /* ボタンを非表示にするためのクラス */
        .hidden { opacity: 0; pointer-events: none; transform: scale(0.8); }

        #scan-btn:active, #reset-btn:active { transform: scale(0.95); }

        /* カメラ画面（読み取り中） */
        #reader { 
            width: 100%; 
            display: none; 
            margin-top: 20px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 50;
        }

        /* カメラ読み取り中のメッセージ */
        #scan-message {
            display: none;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            z-index: 60;
            font-size: 1rem;
        }

        /* コンプリート演出用オーバーレイ */
        #completion-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
            padding: 20px;
            box-sizing: border-box;
        }

        #completion-overlay h2 { 
            font-size: clamp(2rem, 8vw, 3.5rem); 
            margin-bottom: 10px; 
            animation: pop 0.5s infinite alternate;
            text-align: center;
        }

        #completion-overlay p { font-size: clamp(1rem, 4vw, 1.5rem); margin-bottom: 20px;}
        
        .overlay-btn {
            padding: 15px 30px;
            background-color: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
        }

    </style>
</head>
<body>

    <!-- タイトル -->
    <h1>🎉 スタンプラリー 🎉</h1>
    
    <!-- カメラ読み取り中のメッセージ表示エリア -->
    <div id="scan-message">QR コードを読み込んでいます...</div>

    <!-- QR コード読み取り画面（初期は非表示） -->
    <div id="reader"></div>

    <!-- 各ブースのスタンプラリー -->
    <div class="stamp-grid" id="stamp-container">
        <!-- JavaScript で生成されます -->
    </div>

    <!-- 操作ボタンエリア -->
    <div class="action-area">
        <button id="scan-btn">📷 QR コードを読み取る</button>
        
        <!-- リセットボタン -->
        <button id="reset-btn" onclick="resetProgress()">🔄 スタンプをリセットする</button>
    </div>

    <!-- コンプリート演出 -->
    <div id="completion-overlay">
        <h2>CONGRATULATIONS!</h2>
        <p style="font-size: 1.5rem;">全スタンプを収集しました！</p>
        <button class="overlay-btn" onclick="closeOverlay()">閉じる</button>
    </div>

<script>
    // --- 設定データ ---
    const booths = [
        { id: 'pong', name: 'ピンポン玉ゲーム', icon: '🎱' },
        { id: 'ring', name: '輪投げ', icon: '🪀' },
        { id: 'shooting', name: '射的', icon: '🎯' },
        { id: 'marbles', name: 'お手玉投げゲーム', icon: '🔴' },
        { id: 'superbowl', name: 'スーパーボウルすくい', icon: '🏈' },
        { id: 'reversi', name: 'オセロゲーム', icon: '⚫⚪' },
        { id: 'slipper', name: 'スリッパ飛ばし', icon: '🩴' }
    ];

    // --- 初期化処理 ---
    const container = document.getElementById('stamp-container');
    const scanBtn = document.getElementById('scan-btn');
    const readerDiv = document.getElementById('reader');
    const messageDiv = document.getElementById('scan-message');
    let html5QrcodeScanner;

    // ローカルストレージから現在の進捗を取得（なければ空配列）
    function getProgress() {
        return JSON.parse(localStorage.getItem('stampRallyProgress')) || [];
    }

    // スタンプを画面に描画する関数
    function renderStamps() {
        container.innerHTML = '';
        booths.forEach(booth => {
            const isCompleted = getProgress().includes(booth.id);
            
            const div = document.createElement('div');
            div.className = `stamp-item ${isCompleted ? 'completed' : ''}`;
            div.innerHTML = `
                <span class="stamp-icon">${booth.icon}</span>
                <div class="stamp-name">${booth.name}</div>
            `;
            container.appendChild(div);
        });

        // コンプリート判定
        if (getProgress().length === 7) {
            setTimeout(() => {
                document.getElementById('completion-overlay').style.display = 'flex';
            }, 500);
        }
    }

    // --- QR コード読み込みロジック ---
    
    scanBtn.addEventListener('click', () => {
        readerDiv.style.display = 'block';
        
        html5QrcodeScanner = new Html5Qrcode("reader");
        
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };

        // カメラ起動（後方カメラ優先）
        html5QrcodeScanner.start(
            { facingMode: "environment" }, 
            config,
            onScanSuccess
        ).catch(err => {
            console.error("Camera start error:", err);
            alert("カメラの起動に失敗しました。\nブラウザの許可を確認してください。");
        });

        // 読み取り開始時の UI 表示
        messageDiv.style.display = 'block';
    });

    function onScanSuccess(decodedText, decodedResult) {
        // 読み取り成功時の処理
        
        // 1. カメラを停止して画面に戻す
        html5QrcodeScanner.stop().then(() => {
            readerDiv.style.display = 'none';
            
            // 2. QR コードの中身を確認（今回は ID を取得する想定）
            const boothId = decodedText; 
            
            if (booths.find(b => b.id === boothId)) {
                markStampAsCompleted(boothId);
            } else {
                alert("そのブースの QR コードではありません。\n正しい QR コードを読み込んでください。");
            }

        }).catch(err => {
            console.error("Camera stop error:", err);
        });
    }

    // スタンプを押す処理
    function markStampAsCompleted(boothId) {
        const progress = getProgress();
        
        if (!progress.includes(boothId)) {
            progress.push(boothId);
            localStorage.setItem('stampRallyProgress', JSON.stringify(progress));
            
            // 画面更新
            renderStamps();
            
            // ボタンを元に戻す（少し待ってから）
            setTimeout(() => {
                scanBtn.classList.remove('hidden');
                messageDiv.style.display = 'none';
            }, 1000);
        } else {
            alert("もう押していますよ！");
        }
    }

    // --- リセット処理 ---
    
    function resetProgress() {
        if(confirm('スタンプをすべてリセットします。よろしいですか？')) {
            localStorage.removeItem('stampRallyProgress');
            renderStamps();
            alert("リセット完了しました！");
        }
    }

    function closeOverlay() {
        document.getElementById('completion-overlay').style.display = 'none';
    }

    // ページ読み込み時に描画開始
    renderStamps();

</script>
</body>
</html>
