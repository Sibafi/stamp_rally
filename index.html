<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スタンプラリー</title>
    
    <!-- QR コード読み込みライブラリ -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <!-- 紙吹雪演出用ライブラリ (canvas-confetti) -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary-color: #ff6b6b;
            --secondary-color: #4ecdc4;
            --bg-color: #f7f9fc;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            text-align: center;
            color: #333;
            overflow-x: hidden; /* スクロールバーの横出し防止 */
        }

        h1 { 
            margin-bottom: 10px; 
            font-size: 1.5rem; 
            word-break: break-all;
        }
        
        /* --- スタンプカード風デザイン --- */
        .stamp-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 600px;
            margin: 0 auto 30px auto;
        }

        @media (max-width: 480px) {
            .stamp-grid { grid-template-columns: 1fr; }
        }

        /* カードのデザイン */
        .stamp-item {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1); /* カードっぽい影 */
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* バウンドするアニメーション用 */
            position: relative;
            border: 4px solid transparent;
            cursor: pointer;
        }

        .stamp-item.completed {
            background-color: #e8f5e9; 
            border-color: var(--secondary-color);
            transform: translateY(-10px) scale(1.02); /* 少し浮き上がる */
            box-shadow: 0 15px 30px rgba(78, 205, 196, 0.4);
        }

        .stamp-icon { font-size: 50px; display: block; margin-bottom: 10px; }
        .stamp-name { 
            font-weight: bold; 
            font-size: 1rem; 
            word-break: break-all;
            color: #555;
        }

        /* スタンプ押された時のアニメーション */
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        .stamp-item.completed .stamp-icon { animation: pop 0.4s ease; }

        /* --- ボタンエリア --- */
        .action-area {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #scan-btn, #reset-btn {
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        #scan-btn { background-color: var(--primary-color); color: white; }
        #reset-btn { background-color: #95a5a6; color: white; font-size: 1rem;}
        
        #scan-btn:active, #reset-btn:active { transform: scale(0.95); }

        /* --- QR コード読み取り画面（モーダル風）修正版 --- */
        #reader { 
            width: 100%; 
            display: none; 
            margin-top: 20px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 50;
            
            /* 【重要】背景を透明または薄いグレーに戻してカメラ映像が見えるように */
            background-color: rgba(240, 240, 240, 0.9); 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #reader html5-qrcode {
            width: 100%;
            height: 100%;
            /* ライブラリ内部のスタイル調整 */
        }

        /* コンプリート演出用オーバーレイ */
        #completion-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.9); /* 白くして文字が見えるように */
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #333;
            z-index: 100;
            padding: 20px;
            box-sizing: border-box;
        }

        #completion-overlay h2 { 
            font-size: clamp(2rem, 8vw, 4rem); 
            margin-bottom: 10px; 
            animation: pop 0.5s infinite alternate;
            text-align: center;
            color: var(--primary-color);
        }

        #completion-overlay p { font-size: clamp(1rem, 4vw, 2rem); margin-bottom: 30px;}
        
        .overlay-btn {
            padding: 15px 40px;
            background-color: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(78, 205, 196, 0.3);
        }

    </style>
</head>
<body>

    <!-- タイトル -->
    <h1>🎉 スタンプラリー 🎉</h1>
    
    <!-- QR コード読み取り画面（初期は非表示） -->
    <div id="reader"></div>

    <!-- 各ブースのスタンプラリー -->
    <div class="stamp-grid" id="stamp-container">
        <!-- JavaScript で生成されます -->
    </div>

    <!-- 操作ボタンエリア -->
    <div class="action-area">
        <button id="scan-btn">📷 QR コードを読み取る</button>
        
        <!-- リセットボタン -->
        <button id="reset-btn" onclick="resetProgress()">🔄 スタンプをリセットする</button>
    </div>

    <!-- コンプリート演出 -->
    <div id="completion-overlay">
        <h2>CONGRATULATIONS!</h2>
        <p style="font-size: 1.5rem;">全スタンプを収集しました！</p>
        <button class="overlay-btn" onclick="closeOverlay()">閉じる</button>
    </div>

<script>
    // --- 設定データ ---
    const booths = [
        { id: 'pong', name: 'ピンポン玉ゲーム', icon: '🎱' },
        { id: 'ring', name: '輪投げ', icon: '🪀' },
        { id: 'shooting', name: '射的', icon: '🎯' },
        { id: 'marbles', name: 'お手玉投げゲーム', icon: '🔴' },
        { id: 'superbowl', name: 'スーパーボウルすくい', icon: '🏈' },
        { id: 'reversi', name: 'オセロゲーム', icon: '⚫⚪' },
        { id: 'slipper', name: 'スリッパ飛ばし', icon: '🩴' }
    ];

    // --- 初期化処理 ---
    const container = document.getElementById('stamp-container');
    const scanBtn = document.getElementById('scan-btn');
    const readerDiv = document.getElementById('reader');
    let html5QrcodeScanner;

    // ローカルストレージから現在の進捗を取得（なければ空配列）
    function getProgress() {
        return JSON.parse(localStorage.getItem('stampRallyProgress')) || [];
    }

    // スタンプを画面に描画する関数
    function renderStamps() {
        container.innerHTML = '';
        booths.forEach(booth => {
            const isCompleted = getProgress().includes(booth.id);
            
            const div = document.createElement('div');
            div.className = `stamp-item ${isCompleted ? 'completed' : ''}`;
            div.innerHTML = `
                <span class="stamp-icon">${booth.icon}</span>
                <div class="stamp-name">${booth.name}</div>
            `;
            container.appendChild(div);
        });

        // コンプリート判定
        if (getProgress().length === 7) {
            setTimeout(() => {
                document.getElementById('completion-overlay').style.display = 'flex';
                fireConfetti(); // クラッカー演出を実行
            }, 500);
        }
    }

    // --- QR コード読み込みロジック ---
    
    scanBtn.addEventListener('click', () => {
        readerDiv.style.display = 'block';
        
        html5QrcodeScanner = new Html5Qrcode("reader");
        
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };

        // カメラ起動（後方カメラ優先）
        html5QrcodeScanner.start(
            { facingMode: "environment" }, 
            config,
            onScanSuccess
        ).catch(err => {
            console.error("Camera start error:", err);
            alert("カメラの起動に失敗しました。\nブラウザの許可を確認してください。");
        });

        // カメラ起動時に、タイトルとボタンを非表示にする処理（オプション）
        // 今回はユーザーが操作しやすいように非表示にはしませんが、
        // 画面全体を暗くしているので視認性は確保されています。
    });

    function onScanSuccess(decodedText, decodedResult) {
        // 読み取り成功時の処理
        
        // 1. カメラを停止して画面に戻す
        html5QrcodeScanner.stop().then(() => {
            readerDiv.style.display = 'none';
            
            // 2. QR コードの中身を確認（今回は ID を取得する想定）
            const boothId = decodedText; 
            
            if (booths.find(b => b.id === boothId)) {
                markStampAsCompleted(boothId);
            } else {
                alert("そのブースの QR コードではありません。\n正しい QR コードを読み込んでください。");
            }

        }).catch(err => {
            console.error("Camera stop error:", err);
        });
    }

    // スタンプを押す処理
    function markStampAsCompleted(boothId) {
        const progress = getProgress();
        
        if (!progress.includes(boothId)) {
            progress.push(boothId);
            localStorage.setItem('stampRallyProgress', JSON.stringify(progress));
            
            // 画面更新
            renderStamps();
            
            // ボタンを元に戻す（少し待ってから）
            setTimeout(() => {
                scanBtn.style.display = 'block';
            }, 1000);
        } else {
            alert("もう押していますよ！");
        }
    }

    // --- リセット処理 ---
    
    function resetProgress() {
        if(confirm('スタンプをすべてリセットします。よろしいですか？')) {
            localStorage.removeItem('stampRallyProgress');
            renderStamps();
            alert("リセット完了しました！");
        }
    }

    function closeOverlay() {
        document.getElementById('completion-overlay').style.display = 'none';
    }

    // --- クラッカー演出関数 ---
    function fireConfetti() {
        var duration = 5 * 1000;
        var animationEnd = Date.now() + duration;
        var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

        function randomInRange(min, max) {
            return Math.random() * (max - min) + min;
        }

        var interval = setInterval(function() {
            var timeLeft = animationEnd - Date.now();

            if (timeLeft <= 0) {
                return clearInterval(interval);
            }

            var particleCount = 50 * (timeLeft / duration);
            // 左右から紙吹雪を飛ばす
            confetti(Object.assign({}, defaults, { 
                particleCount, 
                origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } 
            }));
            confetti(Object.assign({}, defaults, { 
                particleCount, 
                origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } 
            }));
        }, 250);
    }

    // ページ読み込み時に描画開始
    renderStamps();

</script>
</body>
</html>
